name: Build Artifact

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: pnpm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: backend/internal/web/dist/
          retention-days: 7

  build-linux-amd64:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download frontend artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: backend/internal/web/dist/

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Verify Go version
        run: |
          go version | grep -q 'go1.26.3'

      - name: Build embedded Linux amd64 binary
        working-directory: backend
        env:
          CGO_ENABLED: "0"
        run: |
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          VERSION="$(tr -d '\r\n' < ./cmd/server/VERSION)"
          mkdir -p dist
          go build -tags embed \
            -ldflags="-s -w -X main.Version=${VERSION} -X main.Commit=${COMMIT} -X main.Date=${BUILD_DATE} -X main.BuildType=release" \
            -trimpath \
            -o dist/sub2api-linux-amd64 \
            ./cmd/server
          sha256sum dist/sub2api-linux-amd64 > dist/sub2api-linux-amd64.sha256
          cp ./cmd/server/VERSION dist/VERSION
          printf '%s\n' "${COMMIT}" > dist/COMMIT
          printf '%s\n' "${BUILD_DATE}" > dist/BUILD_DATE
          tar -C dist -czf dist/sub2api-linux-amd64.tar.gz \
            sub2api-linux-amd64 \
            sub2api-linux-amd64.sha256 \
            VERSION \
            COMMIT \
            BUILD_DATE

      - name: Upload Linux amd64 bundle
        uses: actions/upload-artifact@v7
        with:
          name: sub2api-linux-amd64-bundle
          path: |
            backend/dist/sub2api-linux-amd64
            backend/dist/sub2api-linux-amd64.sha256
            backend/dist/sub2api-linux-amd64.tar.gz
            backend/dist/VERSION
            backend/dist/COMMIT
            backend/dist/BUILD_DATE
          retention-days: 14

      - name: Build summary
        run: |
          echo "## Build Artifact" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Artifact: \`sub2api-linux-amd64-bundle\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Binary: \`sub2api-linux-amd64\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Bundle: \`sub2api-linux-amd64.tar.gz\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Includes embedded frontend assets" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Deploy by downloading the artifact, copying the binary to the server, backing up \`/opt/sub2api/bin/sub2api\`, replacing it, and restarting \`sub2api\`." >> "$GITHUB_STEP_SUMMARY"
